kind = "web"
previewPath = "/"
title = "Apex Drive: Real Circuit"
version = "1.0.0"
id = "artifacts/apex-drive"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20693

[services.development]
run = "pnpm --filter @workspace/apex-drive run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apex-drive", "run", "build" ]
publicDir = "artifacts/apex-drive/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20693"
BASE_PATH = "/"
